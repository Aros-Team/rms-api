server:
  address: 0.0.0.0
  port: 8080

app:
  version: 0.2.9
  env: ${APP_ENV:development}
  admin:
    email: ${ADMIN_EMAIL}
    dummy-email: ${DUMMY_EMAIL}
  jwt:
    issuer: rms-api
    expiration-minutes: 60
    public-key: ${JWT_PUBLIC_KEY} 
    private-key: ${JWT_PRIVATE_KEY} 
  email:
    base-url: ${MAIL_URL}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

spring:
  application:
    name: rms
  profiles:
    active: ${APP_ENV:development}
  datasource:
    url: jdbc:mysql://localhost:3306/rmsdb
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        connection:
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
      base-path: /
      path-mapping:
        prometheus: metrics
  endpoint:
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    web:
      server:
        enabled: true
    tags:
      application: rms
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 2000ms, 3000ms
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

