server:
  address: 0.0.0.0
  port: 8080

spring:
  profiles:
    active: ${APP_ENV}

app:
  version: 0.3.3
  jwt:
    issuer: rms-api
    expiration-minutes: 60
    public-key: ${JWT_PUBLIC_KEY} 
    private-key: ${JWT_PRIVATE_KEY} 
  email:
    base-url: ${MAIL_URL}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
      base-path: /
      path-mapping:
        prometheus: metrics
  endpoint:
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    web:
      server:
        enabled: true
    tags:
      application: rms
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 2000ms, 3000ms
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

