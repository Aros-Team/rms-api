name: release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Release Please
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2
      
      - uses: google-github-actions/release-please-action@v5.0.0
        id: release
        with:
          release-type: java-yoshi
          token: ${{ secrets.GITHUB_TOKEN }}

  # Notification: Release PR created (pending approval)
  notify_pr_created:
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true' && needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: |
            .github/scripts
            .github/scripts/templates
          sparse-checkout-cone-mode: false

      - name: Make script executable
        run: chmod +x .github/scripts/send-email.sh

      - name: Send PR created notification via Resend
        run: |
          ./.github/scripts/send-email.sh \
            "${{ secrets.RESEND_API_KEY }}" \
            "${{ secrets.RESEND_FROM_EMAIL }}" \
            ".github/scripts/templates/release-pending.txt" \
            "${{ secrets.RESEND_TO_EMAIL_1 }}" \
            "${{ secrets.RESEND_TO_EMAIL_2 }}" \
            "${{ secrets.RESEND_TO_EMAIL_3 }}" \
            "${{ secrets.RESEND_TO_EMAIL_4 }}" \
            REPO="$GITHUB_REPOSITORY" \
            BRANCH="$GITHUB_REF_NAME" \
            TAG="${{ needs.release-please.outputs.tag_name }}" \
            RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

  # Job 2: Build and Push Docker Image
  build-docker:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - uses: actions/cache@v5.0.4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build project
        run: ./gradlew build
      
      - uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push Docker image
        run: |
          docker build -t rms-api:${{ needs.release-please.outputs.tag_name }} .
          docker push rms-api:${{ needs.release-please.outputs.tag_name }}

  # Notification: Docker build failure
  notify_build_failure:
    needs: [release-please, build-docker]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: |
            .github/scripts
            .github/scripts/templates
          sparse-checkout-cone-mode: false

      - name: Make script executable
        run: chmod +x .github/scripts/send-email.sh

      - name: Send failure notification via Resend
        run: |
          ./.github/scripts/send-email.sh \
            "${{ secrets.RESEND_API_KEY }}" \
            "${{ secrets.RESEND_FROM_EMAIL }}" \
            ".github/scripts/templates/failure.txt" \
            "${{ secrets.RESEND_TO_EMAIL_1 }}" \
            "${{ secrets.RESEND_TO_EMAIL_2 }}" \
            "${{ secrets.RESEND_TO_EMAIL_3 }}" \
            "${{ secrets.RESEND_TO_EMAIL_4 }}" \
            REPO="$GITHUB_REPOSITORY" \
            BRANCH="$GITHUB_REF_NAME" \
            TAG="${{ needs.release-please.outputs.tag_name }}" \
            RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

  # Notification: Release success
  notify_release_success:
    needs: [release-please, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: |
            .github/scripts
            .github/scripts/templates
          sparse-checkout-cone-mode: false

      - name: Make script executable
        run: chmod +x .github/scripts/send-email.sh

      - name: Send success notification via Resend
        run: |
          ./.github/scripts/send-email.sh \
            "${{ secrets.RESEND_API_KEY }}" \
            "${{ secrets.RESEND_FROM_EMAIL }}" \
            ".github/scripts/templates/release-success.txt" \
            "${{ secrets.RESEND_TO_EMAIL_1 }}" \
            "${{ secrets.RESEND_TO_EMAIL_2 }}" \
            "${{ secrets.RESEND_TO_EMAIL_3 }}" \
            "${{ secrets.RESEND_TO_EMAIL_4 }}" \
            REPO="$GITHUB_REPOSITORY" \
            TAG="${{ needs.release-please.outputs.tag_name }}" \
            RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
